<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
  <title>Recalla Card</title>
  <meta name="description" content="Never forget human details. Recalla is a private memory log for the people in your life — no accounts, no cloud." />
  <meta property="og:title" content="Recalla Card" />
  <meta property="og:description" content="Never forget human details. Private memory logs, stored on your device." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://polkat17.github.io/recall-card/" />
  <meta property="og:image" content="https://polkat17.github.io/recall-card/og-image.png" />
  <meta property="og:image:width" content="1024" />
  <meta property="og:image:height" content="500" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:image" content="https://polkat17.github.io/recall-card/og-image.png" />
  <link rel="icon" href="assets/app-icon.png" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #FAF8F4;
      --card: #FFFFFF;
      --ink: #1A1A1A;
      --ink-78: rgba(26, 26, 26, 0.78);
      --muted: rgba(26, 26, 26, 0.55);
      --faint: #F0EDE8;
      --hairline: rgba(26, 26, 26, 0.10);
      --gold: #C8A97E;
      --gold-ink: #8A6E45;
      --gold-tint: rgba(200, 169, 126, 0.16);
      --radius-card: 22px;
      --radius-btn: 28px;
      --sans: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', system-ui, sans-serif;
      --serif: ui-serif, 'Iowan Old Style', 'Apple Garamond', 'Hoefler Text', Georgia, serif;
      --mono: ui-monospace, 'SF Mono', Menlo, monospace;
    }

    html, body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--ink);
      min-height: 100%;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 56px 20px 80px;
    }

    /* ── Wordmark ─────────────────────────────────────────────── */
    .wordmark {
      font-family: var(--serif);
      font-style: italic;
      font-weight: 500;
      font-size: 22px;
      color: var(--ink);
      margin-bottom: 28px;
      letter-spacing: -0.3px;
      display: inline-flex;
      align-items: baseline;
    }
    .wordmark .dot { color: var(--gold); }

    /* ── Card ─────────────────────────────────────────────────── */
    .card {
      background: var(--card);
      border-radius: var(--radius-card);
      border: 0.5px solid var(--hairline);
      padding: 28px 26px;
      width: 100%;
      max-width: 400px;
      margin-bottom: 12px;
      animation: rise 0.45s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .top-row {
      display: flex;
      align-items: flex-start;
      gap: 16px;
    }

    .avatar {
      width: 60px;
      height: 60px;
      border-radius: 18px;
      background: var(--ink);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--sans);
      font-size: 22px;
      font-weight: 700;
      color: var(--bg);
      flex-shrink: 0;
      letter-spacing: 0.5px;
    }

    .identity { flex: 1; min-width: 0; padding-top: 2px; }
    .name {
      font-family: var(--serif);
      font-style: italic;
      font-weight: 500;
      font-size: 28px;
      line-height: 1.08;
      color: var(--ink);
      letter-spacing: -0.5px;
      margin-bottom: 8px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .meta-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      color: var(--muted);
      line-height: 1.4;
      margin-top: 4px;
    }
    .meta-row svg { flex-shrink: 0; opacity: 0.7; }
    .meta-row .text {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .divider {
      height: 0.5px;
      background: var(--hairline);
      margin: 22px 0 20px;
    }

    /* ── Hooks ───────────────────────────────────────────────── */
    .hooks-label {
      font-size: 10.5px;
      font-weight: 700;
      letter-spacing: 1.5px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 12px;
    }
    .hooks { display: flex; flex-direction: column; gap: 12px; }
    .hook {
      display: flex;
      align-items: baseline;
      gap: 12px;
      animation: fadeIn 0.4s ease both;
    }
    .hook:nth-child(1) { animation-delay: 0.15s; }
    .hook:nth-child(2) { animation-delay: 0.25s; }
    .hook:nth-child(3) { animation-delay: 0.35s; }
    .hook:nth-child(4) { animation-delay: 0.45s; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateX(-4px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .hook-arrow {
      color: var(--gold);
      font-size: 14px;
      flex-shrink: 0;
      line-height: 1;
      transform: translateY(1px);
    }
    .hook-text {
      font-size: 15px;
      color: var(--ink);
      line-height: 1.5;
      letter-spacing: -0.05px;
    }

    /* ── Contacts ────────────────────────────────────────────── */
    .contacts { display: flex; flex-direction: column; gap: 4px; }
    .contact-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 0;
      font-size: 14px;
      color: var(--ink-78);
      text-decoration: none;
      transition: color 0.15s;
    }
    .contact-row:hover { color: var(--ink); }
    .contact-row .icon {
      width: 20px; height: 20px;
      display: flex; align-items: center; justify-content: center;
      color: var(--muted); flex-shrink: 0;
    }
    .contact-row .text {
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }

    /* ── Actions ─────────────────────────────────────────────── */
    .actions {
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 16px;
      animation: rise 0.45s 0.1s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      height: 54px;
      padding: 0 22px;
      border-radius: var(--radius-btn);
      font-family: var(--sans);
      font-size: 15.5px;
      font-weight: 600;
      letter-spacing: -0.1px;
      text-decoration: none;
      cursor: pointer;
      border: none;
      transition: opacity 0.15s, transform 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:active { transform: scale(0.985); opacity: 0.92; }

    .btn-primary {
      background: var(--ink);
      color: var(--bg);
    }
    .btn-outline {
      background: transparent;
      color: var(--ink);
      border: 0.5px solid var(--hairline);
    }
    .btn-text {
      background: transparent;
      color: var(--muted);
      height: 44px;
      font-size: 14px;
      font-weight: 500;
    }
    .btn-text:hover { color: var(--ink); }
    .btn .arrow { opacity: 0.7; transition: transform 0.15s; }
    .btn:hover .arrow { transform: translateX(2px); }

    /* ── Pitch ──────────────────────────────────────────────── */
    .pitch {
      width: 100%;
      max-width: 400px;
      margin-top: 48px;
      padding-top: 36px;
      border-top: 0.5px solid var(--hairline);
      animation: rise 0.45s 0.2s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .pitch-eyebrow {
      font-size: 10.5px;
      font-weight: 700;
      letter-spacing: 1.8px;
      color: var(--muted);
      margin-bottom: 14px;
      text-transform: uppercase;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .pitch-eyebrow::before {
      content: '';
      display: inline-block;
      width: 5px; height: 5px; border-radius: 3px;
      background: var(--gold);
    }

    .pitch-headline {
      font-family: var(--serif);
      font-style: italic;
      font-weight: 500;
      font-size: 32px;
      color: var(--ink);
      line-height: 1.1;
      margin-bottom: 14px;
      letter-spacing: -0.5px;
    }

    .pitch-body {
      font-size: 15px;
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 24px;
      max-width: 360px;
    }

    .features-card {
      background: var(--card);
      border: 0.5px solid var(--hairline);
      border-radius: var(--radius-card);
      padding: 4px 18px;
      margin-bottom: 22px;
    }

    .feature {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 0;
      border-top: 0.5px solid var(--hairline);
    }
    .feature:first-child { border-top: none; }

    .feature-icon {
      width: 36px;
      height: 36px;
      background: var(--faint);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      color: var(--ink);
    }

    .feature-text { flex: 1; }
    .feature-title {
      font-size: 14.5px; font-weight: 600;
      color: var(--ink); letter-spacing: -0.05px;
    }
    .feature-desc {
      font-size: 13px; color: var(--muted); margin-top: 2px;
      line-height: 1.45;
    }

    .privacy-line {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 13px;
      color: var(--muted);
      margin-top: 24px;
      padding: 12px 14px;
      background: var(--gold-tint);
      border-radius: 999px;
    }
    .privacy-line svg { color: var(--gold-ink); flex-shrink: 0; }
    .privacy-line strong { color: var(--ink); font-weight: 600; }

    /* ── Footer ─────────────────────────────────────────────── */
    .footer {
      margin-top: 56px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12.5px;
      color: var(--muted);
    }
    .footer .word {
      font-family: var(--serif);
      font-style: italic;
      font-weight: 500;
      font-size: 14px;
      color: var(--ink);
      letter-spacing: -0.2px;
    }
    .footer .word .dot { color: var(--gold); }

    /* ── Error ──────────────────────────────────────────────── */
    .error {
      text-align: center;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.7;
      max-width: 320px;
      padding-top: 24px;
      padding-bottom: 8px;
    }
    .error .em {
      font-family: var(--serif);
      font-style: italic;
      font-size: 22px;
      color: var(--ink);
      display: block;
      margin-bottom: 8px;
      letter-spacing: -0.3px;
    }

    @media (max-width: 380px) {
      body { padding: 40px 16px 60px; }
      .name { font-size: 24px; }
      .pitch-headline { font-size: 27px; }
    }
  </style>
</head>
<body>
  <div class="wordmark">Recalla<span class="dot">.</span></div>
  <div id="root"></div>
  <div class="footer">
    <span>Shared via</span>
    <span class="word">Recalla<span class="dot">.</span></span>
  </div>

  <script>
    // ── Icons (monoline, 18px) ─────────────────────────────────
    const ICON = {
      briefcase: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none"><rect x="3" y="7" width="18" height="13" rx="1.5" stroke="currentColor" stroke-width="1.5"/><path d="M9 7 V5 a1 1 0 0 1 1 -1 h4 a1 1 0 0 1 1 1 V7" stroke="currentColor" stroke-width="1.5"/></svg>',
      pin: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M12 3 a6 6 0 0 1 6 6 c0 4 -6 12 -6 12 s -6 -8 -6 -12 a6 6 0 0 1 6 -6 Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/><circle cx="12" cy="9" r="2" stroke="currentColor" stroke-width="1.5"/></svg>',
      mail: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none"><rect x="3" y="5.5" width="18" height="13" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M3.5 7 L12 13 L20.5 7" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>',
      phone: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M5 4 h4 l2 5 l-2.5 1.5 a11 11 0 0 0 5 5 l1.5 -2.5 l5 2 v4 a2 2 0 0 1 -2 2 a15 15 0 0 1 -15 -15 a2 2 0 0 1 2 -2 Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>',
      link: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M10 14 L14 10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M13 7 L15 5 a4 4 0 0 1 6 6 L19 13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M11 17 L9 19 a4 4 0 0 1 -6 -6 L5 11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>',
      pages: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none"><rect x="4" y="3" width="13" height="17" rx="1.5" stroke="currentColor" stroke-width="1.5"/><line x1="7" y1="8" x2="14" y2="8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><line x1="7" y1="12" x2="14" y2="12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><line x1="7" y1="16" x2="11" y2="16" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>',
      lock: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none"><rect x="5" y="10" width="14" height="11" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M8 10 V7 a4 4 0 0 1 8 0 V10" stroke="currentColor" stroke-width="1.5"/></svg>',
      card: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none"><rect x="3" y="6" width="18" height="12" rx="2" stroke="currentColor" stroke-width="1.5"/><line x1="3" y1="10" x2="21" y2="10" stroke="currentColor" stroke-width="1.5"/></svg>',
      arrow: '<svg class="arrow" width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3 7 H11" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><path d="M7.5 3.5 L11 7 L7.5 10.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>',
      shield: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M12 3 L20 6 V12 c0 5 -4 8 -8 9 c-4 -1 -8 -4 -8 -9 V6 Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>',
    };

    const params = new URLSearchParams(window.location.search);
    const encC = params.get('c');   // v2: deflate-raw + base64url (current app format)
    const encD = params.get('d');   // v1: plain base64 JSON (legacy printed QRs)
    const encoded = encC || encD;
    const fmt = encC ? 'c' : 'd';
    const root = document.getElementById('root');

    // v1 legacy: base64 → JSON
    function decodeLegacy(enc) {
      try { return JSON.parse(decodeURIComponent(escape(atob(enc)))); }
      catch (_) { return null; }
    }
    // v2 current: base64url → deflate-raw → JSON (matches cardCodec.js / app shares)
    async function decodeCompact(enc) {
      try {
        const b64 = enc.replace(/-/g, '+').replace(/_/g, '/');
        const bin = atob(b64 + '='.repeat((4 - (b64.length % 4)) % 4));
        const bytes = new Uint8Array(bin.length);
        for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
        const stream = new Blob([bytes]).stream().pipeThrough(new DecompressionStream('deflate-raw'));
        return JSON.parse(await new Response(stream).text());
      } catch (_) { return null; }
    }

    function initials(name) {
      if (!name) return '?';
      return name.trim().split(/\s+/).map(w => w[0]).filter(Boolean).slice(0, 2).join('').toUpperCase();
    }

    function esc(s) {
      return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function buildVCard(c) {
      const parts = (c.n || '').trim().split(' ');
      const first = parts[0] || '';
      const last = parts.slice(1).join(' ') || '';
      const lines = [
        'BEGIN:VCARD', 'VERSION:3.0',
        'FN:' + (c.n || ''),
        'N:' + last + ';' + first + ';;;',
      ];
      if (c.c) lines.push('ORG:' + c.c);
      if (c.r) lines.push('TITLE:' + c.r);
      if (c.e) lines.push('EMAIL;TYPE=WORK:' + c.e);
      if (c.p) lines.push('TEL;TYPE=CELL:' + c.p);
      if (c.li) {
        const url = c.li.startsWith('http') ? c.li : 'https://' + c.li;
        lines.push('URL:' + url);
      }
      lines.push('END:VCARD');
      return lines.join('\r\n');
    }

    function downloadVCard(c) {
      const vcf = buildVCard(c);
      const blob = new Blob([vcf], { type: 'text/vcard' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = ((c.n || 'contact').replace(/\s+/g, '_')) + '.vcf';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    const pitchHtml = `
      <div class="pitch">
        <div class="pitch-eyebrow">What is Recalla?</div>
        <h2 class="pitch-headline">Never forget<br>human details.</h2>
        <p class="pitch-body">A private memory log for the people in your life. Stored on your device — no accounts, no cloud, no sync.</p>
        <div class="features-card">
          <div class="feature">
            <div class="feature-icon">${ICON.pages}</div>
            <div class="feature-text">
              <div class="feature-title">Memory logs, by category</div>
              <div class="feature-desc">Family, work, plans — find what matters in seconds.</div>
            </div>
          </div>
          <div class="feature">
            <div class="feature-icon">${ICON.lock}</div>
            <div class="feature-text">
              <div class="feature-title">Everything stays on your phone</div>
              <div class="feature-desc">No account. No cloud. Only you can read it.</div>
            </div>
          </div>
          <div class="feature">
            <div class="feature-icon">${ICON.card}</div>
            <div class="feature-text">
              <div class="feature-title">Share your own card</div>
              <div class="feature-desc">Create a card like this one. Share it as a link or QR.</div>
            </div>
          </div>
        </div>
        <a class="btn btn-primary" href="https://github.com/polkat17/recall" target="_blank" rel="noopener">
          Get Recalla ${ICON.arrow}
        </a>
        <div class="privacy-line">
          ${ICON.shield}
          <span><strong>Notes only.</strong> Contacts never leave the device.</span>
        </div>
      </div>`;

    (async function () {
    if (!encoded) {
      root.innerHTML = '<div class="error"><span class="em">No card data in this link.</span>Ask the person to reshare from their Recalla app.</div>' + pitchHtml;
    } else {
      const c = fmt === 'c' ? await decodeCompact(encoded) : decodeLegacy(encoded);
      if (!c) {
        root.innerHTML = '<div class="error"><span class="em">This link looks broken.</span>Ask the person to reshare it.</div>' + pitchHtml;
      } else {
        const hooks = (c.h || []).filter(Boolean);
        const hasContacts = c.e || c.p || c.li;
        const deepLink = 'recalla://card?' + fmt + '=' + encodeURIComponent(encoded);
        const title = esc(c.n) || 'Shared Card';

        // Meta rows
        const metaParts = [];
        if (c.r || c.c) {
          metaParts.push(
            '<div class="meta-row">' + ICON.briefcase +
            '<span class="text">' + esc([c.r, c.c].filter(Boolean).join(' · ')) + '</span></div>'
          );
        }
        if (c.l) {
          metaParts.push(
            '<div class="meta-row">' + ICON.pin +
            '<span class="text">' + esc(c.l) + '</span></div>'
          );
        }

        const hooksHtml = hooks.length ? `
          <div class="divider"></div>
          <div class="hooks-label">Worth remembering</div>
          <div class="hooks">
            ${hooks.map(h => `
              <div class="hook">
                <span class="hook-arrow">→</span>
                <span class="hook-text">${esc(h)}</span>
              </div>`).join('')}
          </div>` : '';

        const contactsHtml = hasContacts ? `
          <div class="divider"></div>
          <div class="contacts">
            ${c.e ? `<a class="contact-row" href="mailto:${esc(c.e)}"><span class="icon">${ICON.mail}</span><span class="text">${esc(c.e)}</span></a>` : ''}
            ${c.p ? `<a class="contact-row" href="tel:${esc(c.p)}"><span class="icon">${ICON.phone}</span><span class="text">${esc(c.p)}</span></a>` : ''}
            ${c.li ? `<a class="contact-row" href="https://${esc(c.li)}" target="_blank" rel="noopener"><span class="icon">${ICON.link}</span><span class="text">${esc(c.li)}</span></a>` : ''}
          </div>` : '';

        document.title = (c.n || 'Shared Card') + ' — Recalla';

        root.innerHTML = `
          <div class="card">
            <div class="top-row">
              <div class="avatar">${esc(initials(c.n))}</div>
              <div class="identity">
                <div class="name">${title}</div>
                ${metaParts.join('')}
              </div>
            </div>
            ${hooksHtml}
            ${contactsHtml}
          </div>

          <div class="actions">
            <a class="btn btn-primary" href="${deepLink}">Save in Recalla ${ICON.arrow}</a>
            <button class="btn btn-outline" id="vcardBtn">Add to phone contacts</button>
            <a class="btn btn-text" href="https://github.com/polkat17/recall" target="_blank" rel="noopener">Don't have Recalla yet?</a>
          </div>

          ${pitchHtml}`;
        document.getElementById('vcardBtn').addEventListener('click', () => downloadVCard(c));
      }
    }
    })();
  </script>
</body>
</html>
