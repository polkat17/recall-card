<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
  <title>Recalla Card</title>
  <meta name="description" content="Never forget human details. Recalla is a private memory log for the people in your life — no accounts, no cloud." />
  <meta property="og:title" content="Recalla Card" />
  <meta property="og:description" content="Never forget human details. Private memory logs, stored on your device." />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #FAF8F4;
      --card: #FFFFFF;
      --dark: #1A1A1A;
      --muted: #999;
      --faint: #F0EDE8;
      --gold: #C8A97E;
      --radius: 24px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 20px 80px;
      -webkit-font-smoothing: antialiased;
    }

    /* Brand */
    .wordmark-logo {
      width: 40px;
      height: 40px;
      margin-bottom: 32px;
      border-radius: 12px;
      display: block;
    }
    .wordmark {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 3px;
      color: #CCC;
      margin-bottom: 36px;
      text-transform: uppercase;
    }

    /* Card */
    .card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 28px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 2px 0 rgba(0,0,0,0.04), 0 8px 32px rgba(0,0,0,0.08);
      margin-bottom: 16px;
      animation: rise 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .top-row {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 0;
    }

    .avatar {
      width: 64px;
      height: 64px;
      border-radius: 20px;
      background: var(--dark);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: 700;
      color: #FAF8F4;
      flex-shrink: 0;
      letter-spacing: -0.5px;
    }

    .identity { flex: 1; min-width: 0; }
    .name {
      font-size: 26px;
      font-weight: 600;
      color: var(--dark);
      letter-spacing: -0.5px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .meta {
      font-size: 14px;
      color: var(--muted);
      margin-top: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .location {
      font-size: 13px;
      color: var(--muted);
      margin-top: 2px;
    }

    .divider {
      height: 1px;
      background: var(--faint);
      margin: 20px 0;
    }

    /* Hooks */
    .hooks { display: flex; flex-direction: column; gap: 10px; }
    .hook {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      animation: fadeIn 0.3s ease both;
    }
    .hook:nth-child(1) { animation-delay: 0.15s; }
    .hook:nth-child(2) { animation-delay: 0.25s; }
    .hook:nth-child(3) { animation-delay: 0.35s; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateX(-6px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .hook-arrow {
      color: var(--gold);
      font-size: 14px;
      margin-top: 2px;
      flex-shrink: 0;
    }
    .hook-text {
      font-size: 15px;
      color: var(--dark);
      line-height: 1.5;
    }

    /* Contact details */
    .contacts { display: flex; flex-direction: column; gap: 8px; }
    .contact-row {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
      color: #555;
      text-decoration: none;
    }
    .contact-row:hover { color: var(--dark); }
    .contact-icon { font-size: 15px; width: 20px; text-align: center; }

    /* Actions */
    .actions {
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      animation: rise 0.4s 0.1s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 16px 20px;
      border-radius: 16px;
      font-size: 16px;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      border: none;
      transition: opacity 0.15s, transform 0.15s;
    }
    .btn:active { transform: scale(0.97); opacity: 0.9; }

    .btn-primary {
      background: var(--dark);
      color: #FAF8F4;
    }
    .btn-outline {
      background: transparent;
      color: var(--dark);
      border: 1.5px solid var(--dark);
    }
    .btn-secondary {
      background: var(--faint);
      color: var(--dark);
    }

    /* What is Recalla */
    .pitch {
      width: 100%;
      max-width: 400px;
      margin-top: 40px;
      padding-top: 32px;
      border-top: 1px solid var(--faint);
      animation: rise 0.4s 0.2s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .pitch-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      color: #CCC;
      margin-bottom: 16px;
      text-transform: uppercase;
    }

    .pitch-headline {
      font-size: 22px;
      font-weight: 600;
      color: var(--dark);
      line-height: 1.3;
      margin-bottom: 12px;
      letter-spacing: -0.3px;
    }

    .pitch-body {
      font-size: 15px;
      color: var(--muted);
      line-height: 1.7;
      margin-bottom: 24px;
    }

    .features {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 28px;
    }

    .feature {
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }

    .feature-icon {
      font-size: 18px;
      width: 32px;
      height: 32px;
      background: var(--faint);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .feature-text { padding-top: 4px; }
    .feature-title { font-size: 14px; font-weight: 600; color: var(--dark); }
    .feature-desc { font-size: 13px; color: var(--muted); margin-top: 1px; }

    .powered {
      font-size: 12px;
      color: #CCC;
      text-align: center;
      margin-top: 48px;
    }

    /* Error */
    .error {
      text-align: center;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.7;
      max-width: 320px;
      padding-top: 40px;
    }
  </style>
</head>
<body>
  <img src="./logo.png" alt="Recalla" class="wordmark-logo" />
  <div id="root"></div>
  <p class="powered">Shared via Recalla</p>

  <script>
    const params = new URLSearchParams(window.location.search);
    const encoded = params.get('d');
    const root = document.getElementById('root');

    function decode(enc) {
      try { return JSON.parse(decodeURIComponent(escape(atob(enc)))); }
      catch (_) { return null; }
    }

    function initials(name) {
      if (!name) return '?';
      return name.trim().split(/\s+/).map(w => w[0]).filter(Boolean).slice(0, 2).join('').toUpperCase();
    }

    function esc(s) {
      return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function buildVCard(c) {
      const parts = (c.n || '').trim().split(' ');
      const first = parts[0] || '';
      const last = parts.slice(1).join(' ') || '';
      const lines = [
        'BEGIN:VCARD',
        'VERSION:3.0',
        `FN:${c.n || ''}`,
        `N:${last};${first};;;`,
      ];
      if (c.c) lines.push(`ORG:${c.c}`);
      if (c.r) lines.push(`TITLE:${c.r}`);
      if (c.e) lines.push(`EMAIL;TYPE=WORK:${c.e}`);
      if (c.p) lines.push(`TEL;TYPE=CELL:${c.p}`);
      if (c.li) {
        const url = c.li.startsWith('http') ? c.li : `https://${c.li}`;
        lines.push(`URL:${url}`);
      }
      lines.push('END:VCARD');
      return lines.join('\r\n');
    }

    function downloadVCard(c) {
      const vcf = buildVCard(c);
      const blob = new Blob([vcf], { type: 'text/vcard' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = ((c.n || 'contact').replace(/\s+/g, '_')) + '.vcf';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    const pitchHtml = `
      <div class="pitch">
        <p class="pitch-label">What is Recalla?</p>
        <h2 class="pitch-headline">Never forget<br>human details</h2>
        <p class="pitch-body">Recalla gives every contact their own private memory log — stored entirely on your device. No accounts, no cloud sync, no data collection.</p>
        <div class="features">
          <div class="feature">
            <div class="feature-icon">🧠</div>
            <div class="feature-text">
              <div class="feature-title">Memory logs by category</div>
              <div class="feature-desc">Family, background, plans, work — find what matters in seconds</div>
            </div>
          </div>
          <div class="feature">
            <div class="feature-icon">🔒</div>
            <div class="feature-text">
              <div class="feature-title">Fully private</div>
              <div class="feature-desc">Everything stays on your device. No account required</div>
            </div>
          </div>
          <div class="feature">
            <div class="feature-icon">🪪</div>
            <div class="feature-text">
              <div class="feature-title">Share your own card</div>
              <div class="feature-desc">Create a card like this and share it via QR or link</div>
            </div>
          </div>
        </div>
        <a class="btn btn-primary" href="https://github.com/polkat17/recall" target="_blank">Get Recalla →</a>
      </div>`;

    if (!encoded) {
      root.innerHTML = `<p class="error">No card data in this link.<br>Ask the person to reshare from their Recalla app.</p>${pitchHtml}`;
    } else {
      const c = decode(encoded);
      if (!c) {
        root.innerHTML = `<p class="error">This link looks broken.<br>Ask the person to reshare it.</p>${pitchHtml}`;
      } else {
        const hooks = (c.h || []).filter(Boolean);
        const hasContacts = c.e || c.p || c.li;
        const deepLink = 'recall://card?d=' + encodeURIComponent(encoded);
        const title = esc(c.n) || 'Shared Card';

        const hooksHtml = hooks.length ? `
          <div class="divider"></div>
          <div class="hooks">
            ${hooks.map(h => `
              <div class="hook">
                <span class="hook-arrow">→</span>
                <span class="hook-text">${esc(h)}</span>
              </div>`).join('')}
          </div>` : '';

        const contactsHtml = hasContacts ? `
          <div class="divider"></div>
          <div class="contacts">
            ${c.e ? `<a class="contact-row" href="mailto:${esc(c.e)}"><span class="contact-icon">✉️</span>${esc(c.e)}</a>` : ''}
            ${c.p ? `<a class="contact-row" href="tel:${esc(c.p)}"><span class="contact-icon">📞</span>${esc(c.p)}</a>` : ''}
            ${c.li ? `<a class="contact-row" href="https://${esc(c.li)}" target="_blank"><span class="contact-icon">🔗</span>${esc(c.li)}</a>` : ''}
          </div>` : '';

        // Update page title + og tags dynamically
        document.title = `${c.n || 'Shared Card'} — Recalla`;

        root.innerHTML = `
          <div class="card">
            <div class="top-row">
              <div class="avatar">${esc(initials(c.n))}</div>
              <div class="identity">
                <div class="name">${title}</div>
                ${(c.r || c.c) ? `<div class="meta">${esc([c.r, c.c].filter(Boolean).join(' · '))}</div>` : ''}
                ${c.l ? `<div class="location">📍 ${esc(c.l)}</div>` : ''}
              </div>
            </div>
            ${hooksHtml}
            ${contactsHtml}
          </div>

          <div class="actions">
            <a class="btn btn-primary" href="${deepLink}">Save in Recalla</a>
            <button class="btn btn-outline" id="vcardBtn">Add to Phone Contacts</button>
            <a class="btn btn-secondary" href="https://github.com/polkat17/recall" target="_blank">Don't have Recalla yet →</a>
          </div>

          ${pitchHtml}`;
        document.getElementById('vcardBtn').addEventListener('click', () => downloadVCard(c));
      }
    }
  </script>
</body>
</html>
